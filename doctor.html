    <script>
        function toggleMenu() {
            const navMenu = document.querySelector('.nav-menu');
            const hamIcon = document.querySelector('.ham-icon');
            const navOverlay = document.querySelector('.nav-overlay');

            if (!navMenu || !hamIcon) return;

            // Toggle active classes
            navMenu.classList.toggle('active');
            hamIcon.classList.toggle('active');

            if (navOverlay) {
                navOverlay.classList.toggle('active');
            }

            // Manage body scroll
            if (navMenu.classList.contains('active')) {
                document.body.classList.add('menu-open');
                document.body.style.overflow = 'hidden';
            } else {
                document.body.classList.remove('menu-open');
                document.body.style.overflow = '';
            }
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function () {
                const navMenu = document.querySelector('.nav-menu');
                const hamIcon = document.querySelector('.ham-icon');
                const navOverlay = document.querySelector('.nav-overlay');

                if (navMenu && navMenu.classList.contains('active')) {
                    navMenu.classList.remove('active');
                    hamIcon?.classList.remove('active');
                    if (navOverlay) navOverlay.classList.remove('active');
                    document.body.classList.remove('menu-open');
                    document.body.style.overflow = '';
                }
            });
        });

        document.addEventListener('click', function (event) {
            const navMenu = document.querySelector('.nav-menu');
            const hamIcon = document.querySelector('.ham-icon');
            const logo = document.querySelector('.logo');
            const navOverlay = document.querySelector('.nav-overlay');

            if (!navMenu || !hamIcon) return;

            // Don't close if clicking inside menu, hamburger, or logo
            if (!navMenu.contains(event.target) &&
                !hamIcon.contains(event.target) &&
                !logo.contains(event.target)) {

                if (navMenu.classList.contains('active')) {
                    navMenu.classList.remove('active');
                    hamIcon.classList.remove('active');
                    if (navOverlay) navOverlay.classList.remove('active');
                    document.body.classList.remove('menu-open');
                    document.body.style.overflow = '';
                }
            }
        });
        // Wait for both DOM and app to be ready
        function initDoctorsPage() {
            console.log('Initializing doctors page...');

            // Wait for the global app to be initialized
            if (typeof app !== 'undefined' && app.data && app.data.doctors) {
                console.log('App already loaded, rendering doctors...');
                renderDoctorsPage(app.data.doctors);
            } else {
                console.log('Waiting for app to load...');
                // Wait a bit and try again
                setTimeout(() => {
                    if (typeof app !== 'undefined' && app.data && app.data.doctors) {
                        console.log('App loaded, rendering doctors...');
                        renderDoctorsPage(app.data.doctors);
                    } else {
                        // If still not loaded, create new instance
                        console.log('Creating new app instance...');
                        const doctorApp = new MedicalDepartmentsApp(API_CONFIG, STATIC_DATA);
                        doctorApp.init().then(() => {
                            renderDoctorsPage(doctorApp.data.doctors);
                        }).catch(error => {
                            console.error('Error loading doctors:', error);
                            showErrorState();
                        });
                    }
                }, 1000);
            }
        }

        // Function to render doctors on this page
        function renderDoctorsPage(doctors) {
            const container = document.getElementById('doctors-container');

            if (!container) {
                console.error('Doctors container not found');
                return;
            }

            if (!doctors || doctors.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No doctors available at the moment.</p></div>';
                return;
            }

            console.log('Rendering', doctors.length, 'doctors');

            const doctorsHtml = `
                <div class="doctors-grid stagger-animation">
                    ${doctors.map(doctor => {
                const doctorImageUrl = (doctor.image && doctor.image.trim())
                    ? doctor.image
                    : 'https://via.placeholder.com/300x250?text=Doctor';

                return `
                            <div class="doctor-card" data-doctor-id="${doctor.id}">
                                <div class="doctor-image-container">
                                    <img src="${doctorImageUrl}" alt="${doctor.name}" class="doctor-image" onerror="this.src='https://via.placeholder.com/300x250?text=Doctor';">
                                </div>
                                
                                <div class="doctor-info-container">
                                    <h3 class="doctor-name">${doctor.name}</h3>
                                    <p class="doctor-specialty">${doctor.specialty}</p>
                                    <p class="doctor-sub_specialties">${doctor.specialties || ''}</p>
                                    <p class="doctor-hospital">${doctor.hospital || ''}, ${doctor.hospitalCity || ''}</p>
                                    
                                    <div class="doctor-stats-row">
                                        <div class="stat-badge">
                                            <i class="fas fa-award"></i>
                                            <span>${doctor.yearsOfExperience || 0}+ Years</span>
                                        </div>
                                    </div>
                                    
                                    <div class="availability-indicator ${doctor.isAvailable ? 'available' : 'unavailable'}">
                                        <i class="fas fa-circle"></i>
                                        <span>${doctor.isAvailable ? 'Available' : 'Unavailable'}</span>
                                    </div>
                                    
                                    <div class="doctor-actions">
                                        <button class="btn-primary" onclick="bookDoctor('${doctor.name}', '${doctor.specialty || 'General Medicine'}')">
                                            <i class="fas fa-calendar-check"></i>
                                            <span>Book Consultation</span>
                                        </button>
                                        <button class="btn-profile" onclick="window.location.href='${doctor.profileLink}'">
                            
                                            <i class="fas fa-user"></i>
                                            <span>View Profile</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
            }).join('')}
                </div>
            `;

            container.innerHTML = doctorsHtml;

            // Initialize animations
            setTimeout(() => {
                const elements = document.querySelectorAll('.animate-on-scroll, .stagger-animation');
                elements.forEach(el => el.classList.add('animated'));
            }, 100);

            console.log('Doctors rendered successfully');
        }

        function showErrorState() {
            const container = document.getElementById('doctors-container');
            if (container) {
                container.innerHTML = `
                    <div class="error-state" style="text-align: center; padding: 80px 20px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 12px;">
                        <h3 style="color: #856404; margin-bottom: 10px;">Unable to load doctors</h3>
                        <p style="color: #856404;">Please try again later or <a href="index.html" style="color: #007bff;">return to home</a></p>
                    </div>
                `;
            }
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initDoctorsPage);
        } else {
            initDoctorsPage();
        }

        // Also render footer if app is available
        setTimeout(() => {
            if (typeof app !== 'undefined' && app.renderFooter) {
                app.renderFooter();
            }
        }, 1500);
    </script>
